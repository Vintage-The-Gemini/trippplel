services:
  # ── Express Backend ──────────────────────────────────────
  - type: web
    name: trippplel-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://trippplel-client.onrender.com
      - key: SERVER_URL
        value: https://trippplel-server.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PESAPAL_CONSUMER_KEY
        sync: false
      - key: PESAPAL_CONSUMER_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /api/health

  # ── Next.js Frontend ─────────────────────────────────────
  - type: web
    name: trippplel-client
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://trippplel-server.onrender.com/api
      - key: NEXTAUTH_URL
        value: https://trippplel-client.onrender.com
      - key: NEXTAUTH_SECRET
        sync: false
